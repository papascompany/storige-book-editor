version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: storige-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./storage:/app/storage:ro
      - ./apps/editor/dist-embed:/app/editor-embed:ro
      # Let's Encrypt 인증서 (host의 /etc/letsencrypt 직접 마운트)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # certbot HTTP-01 챌린지 webroot
      - ./docker/nginx/certbot-webroot:/var/www/certbot
    depends_on:
      - api
    networks:
      - storige-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: storige-api
    # 2026-07-21 호스트 재부팅(커널 업데이트) 시 코어 서비스 전체가 미복귀 → ~15h 장애.
    # 모니터링 스택만 unless-stopped 였음 — 코어 5종(api/worker/editor/mariadb/redis)에 동일 적용.
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=mariadb
      - DATABASE_PORT=3306
      - DATABASE_USER=${DATABASE_USER:-root}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME:-storige}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - API_KEYS=${API_KEYS}
      # P2c: ApiKeyGuard 가 내부 워커 키를 식별해 외부 라우트 테넌트 스코프를 바이패스(워커 콜백·파일 무중단)
      - WORKER_API_KEY=${WORKER_API_KEY}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - STORAGE_PATH=/app/storage
      # Sentry (DSN 미설정 시 silent 동작)
      - SENTRY_DSN=${SENTRY_DSN_API:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-}
      # Bull 큐 모니터링 (적체/실패 알람 → Sentry)
      - QUEUE_MONITOR_ENABLED=${QUEUE_MONITOR_ENABLED:-true}
      - QUEUE_MONITOR_BACKLOG_THRESHOLD=${QUEUE_MONITOR_BACKLOG_THRESHOLD:-10}
      - QUEUE_MONITOR_INTERVAL_MS=${QUEUE_MONITOR_INTERVAL_MS:-60000}
      - QUEUE_MONITOR_COOLDOWN_MS=${QUEUE_MONITOR_COOLDOWN_MS:-300000}
      # Webhook callbackUrl SSRF 방어 (Patch E, 2026-05-03)
      # 콤마 구분 호스트명 — '*'로 설정 시 모든 URL 허용 (개발용), 비우면 기본값 사용
      - WEBHOOK_ALLOWED_HOSTS=${WEBHOOK_ALLOWED_HOSTS:-papascompany.co.kr,bookmoa.com}
      # WH-001 위조불가 HMAC 서명(X-Storige-Signature-HMAC). 미설정 시 HMAC 헤더 생략(=서명 비활성).
      # .env 에 존재해도 이 environment 매핑이 없으면 컨테이너 런타임에 미주입되어 HMAC 이 silent no-op 가 됨(2026-06-23 적발).
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      # 웹훅 v2 config secret at-rest 암호화 키(64 hex). 미설정 시 v2 전면 비활성(무중단) — 위와 동일한 silent no-op 함정 방지용 매핑(2026-07-16).
      - WEBHOOK_CONFIG_ENC_KEY=${WEBHOOK_CONFIG_ENC_KEY:-}
    volumes:
      - ./storage:/app/storage
    depends_on:
      - mariadb
      - redis
    networks:
      - storige-network

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: storige-worker
    restart: unless-stopped
    # 트랙 B-(e): 워커 메모리 상한(기본 4g). OOM 시 워커만 죽고 API/DB/박스는 보호.
    #   경량검증(ON) 은 상수 메모리라 여유롭고, 만약 OFF 폴백/대용량이 한도 초과해도 박스 안전.
    #   .env WORKER_MEM_LIMIT 로 조정(예: 증설 시 상향).
    mem_limit: ${WORKER_MEM_LIMIT:-4g}
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_HOST=mariadb
      - DATABASE_PORT=3306
      - DATABASE_USER=${DATABASE_USER:-root}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME:-storige}
      - STORAGE_PATH=/app/storage
      - WORKER_STORAGE_PATH=/app
      - GHOSTSCRIPT_PATH=/usr/bin/gs
      - MAX_RETRY_ATTEMPTS=3
      - API_BASE_URL=http://api:4000/api
      - WORKER_API_KEY=${WORKER_API_KEY}
      # 워커 검증 최대 파일 크기(바이트). 기본 1GB — presigned 대용량 업로드 검증 통과용
      # (bookmoa-mobile 요청 2026-06-19: 120MB 등 일반 내지 PDF 통과). .env WORKER_MAX_FILE_SIZE 로 조정.
      # ⚠️ 검증은 PDFDocument.load 로 전체를 메모리에 올림 → 1GB까지는 아래 NODE_OPTIONS 힙 상향으로 커버.
      #    1GB 초과(목표 2GB)는 워커/API 스트리밍 검증 재설계(P2) 후 상향. (정본: LARGE_FILE_UPLOAD_1GB_HANDOFF)
      - WORKER_MAX_FILE_SIZE=${WORKER_MAX_FILE_SIZE:-1073741824}
      # 대용량 PDF(pdf-lib 파싱) 힙 여유 — 기본 노드 힙에 파싱 오버헤드 더해 OOM 방지(8GB VPS, 동시성 주의).
      - NODE_OPTIONS=${WORKER_NODE_OPTIONS:---max-old-space-size=3072}
      # 트랙 B-(d): 경량(스트리밍) 검증 ON 토글. 기본 false(=기존 전체버퍼 OFF 경로, 동작 무변화).
      #   파리티 검증 통과 후 .env WORKER_LIGHTWEIGHT_VALIDATION=true 로 ON → 2GB 상수메모리 검증.
      - WORKER_LIGHTWEIGHT_VALIDATION=${WORKER_LIGHTWEIGHT_VALIDATION:-false}
      # 트랙 B-(f): 변환·합성·렌더 경량(qpdf) 경로 ON 토글. 기본 false. 골든파리티 후 ON.
      - WORKER_LIGHTWEIGHT_SYNTHESIS=${WORKER_LIGHTWEIGHT_SYNTHESIS:-false}
      # 트랙 B-(e) 대비 동시성 토글(기본=현행 3/2). 2GB 활성 시 .env 로 1/1 강제(+mem_limit) 필요.
      - VALIDATION_CONCURRENCY=${VALIDATION_CONCURRENCY:-3}
      - GS_CONCURRENCY=${GS_CONCURRENCY:-2}
      # C-2a: crop mark(TrimBox 기하) 검증 킬스위치. 기본 false(행동 무변화).
      #   ⚠️ .env 에만 넣고 이 매핑을 빼먹으면 silent no-op(WH-001 실적발 전례) — 매핑 필수.
      #   ON 이어도 warning-only + templateSet.cropMarkEnabled opt-in 이중 게이트.
      - WORKER_CROP_MARK_VALIDATION=${WORKER_CROP_MARK_VALIDATION:-false}
      # C+ G3: 미배선 fixMethod(resizeWithPadding 등) FIXABLE→실거부 게이팅. 기본 false.
      #   ⚠️ .env 에만 넣으면 silent no-op(WH-001 전례와 동일) — 이 매핑 필수(2026-07-21 실적발).
      - WORKER_WIRED_FIXABLE_GATING=${WORKER_WIRED_FIXABLE_GATING:-false}
      # R-44 표지 spine 검증 허용오차(mm) — 2단계 승격은 .env 로만(무선 1.0/양장 1.5).
      #   기본 2(관찰 1단계와 동일). MAX 는 orderOptions.spineToleranceMm 오버라이드 상한.
      #   ⚠️ 동일 함정: .env 만으론 no-op — 이 매핑이 있어야 컨테이너에 주입된다.
      - SPINE_TOLERANCE_MM_PERFECT=${SPINE_TOLERANCE_MM_PERFECT:-2}
      - SPINE_TOLERANCE_MM_HARDCOVER=${SPINE_TOLERANCE_MM_HARDCOVER:-2}
      - SPINE_TOLERANCE_MM_MAX=${SPINE_TOLERANCE_MM_MAX:-5}
      # Sentry (DSN 미설정 시 silent 동작)
      - SENTRY_DSN=${SENTRY_DSN_WORKER:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-}
    volumes:
      - ./storage:/app/storage
    depends_on:
      - redis
      - mariadb
    networks:
      - storige-network

  editor:
    build:
      context: .
      dockerfile: docker/editor/Dockerfile
    container_name: storige-editor
    restart: unless-stopped
    ports:
      - "3000:80"
    networks:
      - storige-network

  # admin 서비스는 Vercel(admin.papascompany.co.kr)에 별도 배포되어 운영됨.
  # VPS docker admin은 빌드 의존성 미해결로 빌드 실패하지만 운영 영향 0이라
  # docker-compose에서 제외해 `--build` 시 차단되는 문제를 방지.
  # 향후 admin을 VPS로 이전하려면 packages/types build 선행 + Dockerfile 수정 필요.

  mariadb:
    image: mariadb:11.2
    container_name: storige-mariadb
    restart: unless-stopped
    ports:
      # 보안(2026-07-13): Docker 포트 매핑은 ufw 를 우회한다 — 루프백 한정 바인딩.
      # 외부 정당 소비자 없음(운영 접근은 SSH + docker exec). 컨테이너 간은 network 로 통신.
      - "127.0.0.1:3306:3306"
    # event_scheduler=ON: 인쇄 워크플로우 v1 Phase 2 (2026-05-19) — 게스트 24h 자동삭제 EVENT
    # (evt_purge_expired_guest_sessions) 가 컨테이너 재시작 시에도 작동하도록 영구 설정.
    command: --event-scheduler=ON
    environment:
      - MARIADB_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MARIADB_DATABASE=${DATABASE_NAME:-storige}
      - MARIADB_USER=${DATABASE_USER}
      - MARIADB_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - storige-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: storige-redis
    restart: unless-stopped
    ports:
      # 보안(2026-07-13): 공인망 노출로 SLAVEOF 하이재킹 실사고(2026-05-03~) — 루프백 한정.
      # Redis 는 무인증이므로 절대 공인 바인딩 금지. 컨테이너 간은 network 로 통신.
      - "127.0.0.1:6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - storige-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─────────────────────────────────────────────────────────────────
  # P2-8 운영 메트릭 (옵션 C 하이브리드)
  # 시스템/큐 메트릭 → Grafana, HTTP latency/에러 → Sentry Performance
  # ─────────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: storige-prometheus
    restart: unless-stopped
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    networks:
      - storige-network
    depends_on:
      - api
      - node-exporter
      - redis-exporter

  grafana:
    image: grafana/grafana:11.2.2
    container_name: storige-grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_USER=${GRAFANA_ADMIN_USER:-admin}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-changeme}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_USERS_ALLOW_ORG_CREATE=false
      - GF_AUTH_ANONYMOUS_ENABLED=false
      - GF_SERVER_ROOT_URL=https://api.papascompany.co.kr/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
      - GF_INSTALL_PLUGINS=
    volumes:
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./docker/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    networks:
      - storige-network
    depends_on:
      - prometheus

  node-exporter:
    image: prom/node-exporter:v1.8.2
    container_name: storige-node-exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc|rootfs/var/lib/docker/containers|rootfs/var/lib/docker/overlay2|rootfs/run/docker/netns|rootfs/var/lib/docker/aufs)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - storige-network

  redis-exporter:
    image: oliver006/redis_exporter:v1.66.0-alpine
    container_name: storige-redis-exporter
    restart: unless-stopped
    environment:
      - REDIS_ADDR=redis://redis:6379
    networks:
      - storige-network
    depends_on:
      - redis

  # ─────────────────────────────────────────────────────────────────
  # P2-10 로그 일원화 (Loki + Promtail, Grafana로 통합)
  # ─────────────────────────────────────────────────────────────────
  loki:
    image: grafana/loki:3.2.1
    container_name: storige-loki
    restart: unless-stopped
    command: -config.file=/etc/loki/local-config.yml
    volumes:
      - ./docker/loki/loki-config.yml:/etc/loki/local-config.yml:ro
      - loki_data:/loki
    networks:
      - storige-network

  promtail:
    image: grafana/promtail:3.2.1
    container_name: storige-promtail
    restart: unless-stopped
    command: -config.file=/etc/promtail/config.yml
    volumes:
      - ./docker/promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - storige-network
    depends_on:
      - loki

volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
  loki_data:
    driver: local

networks:
  storige-network:
    driver: bridge
