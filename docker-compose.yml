version: '3.8'

services:
  nginx:
    image: nginx:1.25-alpine
    container_name: storige-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./storage:/app/storage:ro
      - ./apps/editor/dist-embed:/app/editor-embed:ro
      # Let's Encrypt мқёмҰқм„ң (hostмқҳ /etc/letsencrypt м§Ғм ‘ л§ҲмҡҙнҠё)
      - /etc/letsencrypt:/etc/letsencrypt:ro
      # certbot HTTP-01 мұҢлҰ°м§Җ webroot
      - ./docker/nginx/certbot-webroot:/var/www/certbot
    depends_on:
      - api
    networks:
      - storige-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/api/Dockerfile
    container_name: storige-api
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_HOST=mariadb
      - DATABASE_PORT=3306
      - DATABASE_USER=${DATABASE_USER:-root}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME:-storige}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - JWT_SECRET=${JWT_SECRET}
      - API_KEYS=${API_KEYS}
      - CORS_ORIGIN=${CORS_ORIGIN}
      - STORAGE_PATH=/app/storage
      # Sentry (DSN лҜём„Өм • мӢң silent лҸҷмһ‘)
      - SENTRY_DSN=${SENTRY_DSN_API:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-}
    volumes:
      - ./storage:/app/storage
    depends_on:
      - mariadb
      - redis
    networks:
      - storige-network

  worker:
    build:
      context: .
      dockerfile: docker/worker/Dockerfile
    container_name: storige-worker
    ports:
      - "4001:4001"
    environment:
      - NODE_ENV=production
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - DATABASE_HOST=mariadb
      - DATABASE_PORT=3306
      - DATABASE_USER=${DATABASE_USER:-root}
      - DATABASE_PASSWORD=${DATABASE_PASSWORD}
      - DATABASE_NAME=${DATABASE_NAME:-storige}
      - STORAGE_PATH=/app/storage
      - WORKER_STORAGE_PATH=/app
      - GHOSTSCRIPT_PATH=/usr/bin/gs
      - MAX_RETRY_ATTEMPTS=3
      - API_BASE_URL=http://api:4000/api
      - WORKER_API_KEY=${WORKER_API_KEY}
      # Sentry (DSN лҜём„Өм • мӢң silent лҸҷмһ‘)
      - SENTRY_DSN=${SENTRY_DSN_WORKER:-}
      - SENTRY_ENVIRONMENT=${SENTRY_ENVIRONMENT:-production}
      - SENTRY_TRACES_SAMPLE_RATE=${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      - SENTRY_RELEASE=${SENTRY_RELEASE:-}
    volumes:
      - ./storage:/app/storage
    depends_on:
      - redis
      - mariadb
    networks:
      - storige-network

  editor:
    build:
      context: .
      dockerfile: docker/editor/Dockerfile
    container_name: storige-editor
    ports:
      - "3000:80"
    networks:
      - storige-network

  # admin м„ңл№„мҠӨлҠ” Vercel(admin.papascompany.co.kr)м—җ лі„лҸ„ л°°нҸ¬лҗҳм–ҙ мҡҙмҳҒлҗЁ.
  # VPS docker adminмқҖ л№Ңл“ң мқҳмЎҙм„ұ лҜён•ҙкІ°лЎң л№Ңл“ң мӢӨнҢЁн•ҳм§Җл§Ң мҡҙмҳҒ мҳҒн–Ҙ 0мқҙлқј
  # docker-composeм—җм„ң м ңмҷён•ҙ `--build` мӢң м°ЁлӢЁлҗҳлҠ” л¬ём ңлҘј л°©м§Җ.
  # н–Ҙнӣ„ adminмқ„ VPSлЎң мқҙм „н•ҳл Өл©ҙ packages/types build м„ н–ү + Dockerfile мҲҳм • н•„мҡ”.

  mariadb:
    image: mariadb:11.2
    container_name: storige-mariadb
    ports:
      - "3306:3306"
    environment:
      - MARIADB_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MARIADB_DATABASE=${DATABASE_NAME:-storige}
      - MARIADB_USER=${DATABASE_USER}
      - MARIADB_PASSWORD=${DATABASE_PASSWORD}
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - storige-network
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7.2-alpine
    container_name: storige-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - storige-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb_data:
    driver: local
  redis_data:
    driver: local

networks:
  storige-network:
    driver: bridge
