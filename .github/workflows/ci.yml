name: ci

# Phase 0 안전판 — contract test 를 CI 게이트로 승격 (계획서 §Phase 0-3).
# 종전 CI 는 gitleaks(시크릿 스캔)뿐 = 테스트는 honor system 이었다. 이 워크플로가
# master push/PR 마다 아래를 검증한다:
#   1) apps/api jest — 파트너 동결 표면 contract test(src/contract-freeze.spec.ts) +
#      웹훅 서명 페어와이즈(webhook-signature-pairwise.spec.ts) + 기존 스펙 전부
#   2) packages/sdk build+typecheck+test — 파트너 SDK. types-parity/webhook-events 의
#      계약 드리프트 감시와 서명 페어와이즈(수신측)가 여기 걸려야 게이트가 된다
#   3) packages/canvas-core vitest + tsc — 편집기 코어(ServicePlugin.pdf 카나리 포함)
#   4) scripts/pdf-golden 비교 엔진 self-test (qpdf 필요)
#
# ⚠️ 루트 `turbo run test` 는 CI 가 호출하지 않는다 — per-package 명시 필터만 쓴다.
#    새 패키지를 추가하면 **여기에 스텝을 추가해야** 게이트에 연결된다. 안 그러면
#    그 패키지의 테스트는 전부 장식이 된다(SDK 가 실제로 그 상태였다).
#
# ⚠️ branch protection(필수 체크 지정)은 의도적으로 미설정 — master 직push 가 곧
#    배포 트리거인 현행 운영과 충돌(오너 결정 대기). 현재는 push 후행 신호 + PR 게이트.

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        # 버전은 package.json packageManager(pnpm@9.15.0) 에서 자동 해석

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: 유출 방지 검사 (외부 식별자 소스 유입 차단 — pnpm 불필요, 빠른 실패)
        # 내부 정책상 금지된 외부 식별자가 소스에 유입됐는지 검사한다. 배포 번들
        # (editor/admin)의 postbuild 게이트와 짝을 이루는 소스측 게이트. 모든 빌드
        # 변형이 같은 src 를 쓰므로 소스 검사가 변형 무관 catch-all 이다.
        run: node scripts/check-source-exposure.mjs

      - name: 시스템 의존성 (qpdf=골든 self-test · cairo/pango=node-canvas 소스 빌드)
        # node-canvas(canvas@2.11.2)는 fabric 5.x node 엔트리의 하드 요구인데 Node 22 용
        # 프리빌트가 없어 소스 빌드가 필요하다. canvas 는 jsdom 의 optionalDependency 라
        # 빌드 실패가 "조용히 용인"되고(설치는 성공처럼 보임) vitest 로드 시점에
        # 'Cannot find module ../build/Release/canvas.node' 로 터진다(2026-07-03 CI 1차 실적발).
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q qpdf build-essential libcairo2-dev libpango1.0-dev \
            libjpeg-dev libgif-dev librsvg2-dev libpixman-1-dev

      - name: 의존성 설치
        run: pnpm install --frozen-lockfile

      - name: types 선행 빌드 (모노레포 규약 — 다른 패키지가 dist 소비)
        run: pnpm --filter @storige/types build

      - name: sdk 빌드 + 타입체크 + 테스트 (계약 드리프트 감시 + 서명 페어와이즈 수신측)
        # types 선행 빌드 뒤여야 한다 — types-parity.spec 이 @storige/types dist 를
        # 실제 import 해 구조 등가성을 대조한다(devDependency, 런타임 의존 아님).
        # build 를 함께 도는 이유: dts 방출·번들 에러와 node: 프리픽스 보존 같은
        # 아티팩트 수준 회귀는 test 만으로는 잡히지 않는다.
        run: |
          pnpm --filter @storige/sdk build
          pnpm --filter @storige/sdk typecheck
          pnpm --filter @storige/sdk test

      - name: 파트너 quickstart 예제 (examples/* — 타입체크 + 오프라인/E2E 검증)
        # sdk 빌드 뒤여야 한다 — 예제는 workspace:* 로 dist 를 실제 import 한다.
        # verify 는 전부 외부 의존 0: 주문 예제 2종은 주입식 fetch 로 호출 시퀀스를,
        # webhook-receiver 는 임시 포트에 실서버를 띄우고 서명을 직접 만들어 E2E 를 돈다.
        # (이 스텝이 없으면 예제가 SDK 변경으로 조용히 썩는다 — 위 ⚠️ 참조)
        run: |
          for e in pdf-upload-order editor-session-order webhook-receiver; do
            pnpm --filter "@storige/example-$e" typecheck
            pnpm --filter "@storige/example-$e" lint
            pnpm --filter "@storige/example-$e" verify
          done

      - name: api 테스트 (contract-freeze + 서명 페어와이즈 + 전체 스펙)
        run: pnpm --filter @storige/api test

      - name: Partner API v1 OpenAPI export (파트너 전용 스펙 — v1 태그 필터)
        # 스크립트 내부 단언: 모든 경로 /api/v1/* + REQUIRED_PATHS(현 16경로/22오퍼레이션
        # = ping·book-specs 3·books 11·webhooks 7) 존재 — 내부 라우트 유입/누락 시 실패.
        # 등재 누락의 정본 게이트는 partner-openapi-surface.spec(FS 스캔 3중 대조, E-2).
        run: pnpm --filter @storige/api openapi:partner

      - name: Partner API v1 OpenAPI 아티팩트 업로드
        uses: actions/upload-artifact@v4
        with:
          name: openapi-partner
          path: apps/api/openapi-partner.json
          if-no-files-found: error

      - name: canvas-core 타입체크 + 테스트 (ServicePlugin.pdf 카나리 포함)
        run: |
          pnpm --filter @storige/canvas-core typecheck
          pnpm --filter @storige/canvas-core test

      - name: PDF 골든 비교 엔진 self-test
        run: node --test scripts/pdf-golden/compare.test.mjs
