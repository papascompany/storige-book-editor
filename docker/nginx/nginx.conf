user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # ─────────────────────────────────────────────────────────────────
    # HTTP : Let's Encrypt ACME challenge + HTTPS 리다이렉트
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 80;
        server_name api.papascompany.co.kr;

        # certbot HTTP-01 챌린지 경로
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # 그 외 모두 HTTPS로
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────────────────────────────
    # HTTPS : api.papascompany.co.kr — Storige API
    # ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2 on;
        server_name api.papascompany.co.kr;

        ssl_certificate     /etc/letsencrypt/live/api.papascompany.co.kr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.papascompany.co.kr/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # PDF/이미지 업로드 여유분
        client_max_body_size 100M;

        # P2-8 메트릭: 외부에서 /api/health/metrics 차단 (Prometheus는 docker network 내부 직접 접근)
        location = /api/health/metrics {
            return 404;
        }

        # API 요청 → NestJS 컨테이너
        location /api/ {
            proxy_pass http://api:4000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # P2-8 Grafana 운영 메트릭 대시보드
        # GF_SERVER_SERVE_FROM_SUB_PATH=true 와 함께 동작
        # Grafana 자체 인증(admin / GRAFANA_ADMIN_PASSWORD env) 사용
        # ⚠️ proxy_pass 끝 슬래시 없음 — Grafana가 subpath(/grafana)를 직접 받아야 무한 redirect 방지
        location /grafana/ {
            proxy_pass http://grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            # Grafana live (websocket)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }

        # 업로드된 정적 파일 (이미지/PDF)
        location /storage/ {
            alias /app/storage/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            # 선언 MIME 와 다른 페이로드(예: png 라벨인데 실제 html/svg)를 브라우저가 sniff 해
            # 실행하지 못하게 차단(업로드 파일 inline XSS 방어).
            add_header X-Content-Type-Options "nosniff" always;
            add_header Access-Control-Allow-Origin "*";
            # P2-11/B — editor가 crossOriginIsolated 모드일 때 fabric 이미지 로드 통과
            add_header Cross-Origin-Resource-Policy "cross-origin";
        }

        # 에디터 임베드 번들 (bookmoa PHP 측 임베드용)
        location /embed/ {
            alias /app/editor-embed/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            # P2-11/B — crossOriginIsolated 호환
            add_header Cross-Origin-Resource-Policy "cross-origin";

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }

            gzip_static on;
        }

        # 루트 - 단순 텍스트
        location = / {
            return 200 "Storige API\n";
            add_header Content-Type text/plain;
        }
    }
}
