user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1024;

    # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    # HTTP : Let's Encrypt ACME challenge + HTTPS лҰ¬лӢӨмқҙл үнҠё
    # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    server {
        listen 80;
        server_name api.papascompany.co.kr;

        # certbot HTTP-01 мұҢлҰ°м§Җ кІҪлЎң
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # к·ё мҷё лӘЁл‘җ HTTPSлЎң
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    # HTTPS : api.papascompany.co.kr вҖ” Storige API
    # в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
    server {
        listen 443 ssl;
        http2 on;
        server_name api.papascompany.co.kr;

        ssl_certificate     /etc/letsencrypt/live/api.papascompany.co.kr/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.papascompany.co.kr/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # PDF/мқҙлҜём§Җ м—…лЎңл“ң м—¬мң л¶„
        client_max_body_size 100M;

        # P2-8 л©”нҠёлҰӯ: мҷёл¶Җм—җм„ң /api/health/metrics м°ЁлӢЁ (PrometheusлҠ” docker network лӮҙл¶Җ м§Ғм ‘ м ‘к·ј)
        location = /api/health/metrics {
            return 404;
        }

        # API мҡ”мІӯ вҶ’ NestJS м»Ён…Ңмқҙл„Ҳ
        location /api/ {
            proxy_pass http://api:4000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
            # нҠёлһҷ B-(c): лҢҖмҡ©лҹү мҠӨнҠёлҰј нҶөкіј вҖ” nginx к°Җ мқ‘лӢө/мҡ”мІӯ ліёл¬ёмқ„ л””мҠӨнҒ¬/л©”лӘЁлҰ¬м—җ лІ„нҚјл§Ғн•ҳм§Җ
            # м•Ҡкі  к·ёлҢҖлЎң нқҳл ӨліҙлӮёлӢӨ. лҜём„Өм • мӢң nginx к°Җ 2GB лӢӨмҡҙлЎңл“ң(/files/:id/rawВ·download)лҘј
            # нҶөм§ё лІ„нҚјл§Ғн•ҙ м§Җм—°/л””мҠӨнҒ¬м••л°• л°ңмғқ. API мҠӨнҠёлҰ¬л°Қ(stream.pipe)кіј м§қмқ„ мқҙлӨ„м•ј нҡЁкіј.
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # P2-8 Grafana мҡҙмҳҒ л©”нҠёлҰӯ лҢҖмӢңліҙл“ң
        # GF_SERVER_SERVE_FROM_SUB_PATH=true мҷҖ н•Ёк»ҳ лҸҷмһ‘
        # Grafana мһҗмІҙ мқёмҰқ(admin / GRAFANA_ADMIN_PASSWORD env) мӮ¬мҡ©
        # вҡ пёҸ proxy_pass лҒқ мҠ¬лһҳмӢң м—ҶмқҢ вҖ” Grafanaк°Җ subpath(/grafana)лҘј м§Ғм ‘ л°ӣм•„м•ј л¬ҙн•ң redirect л°©м§Җ
        location /grafana/ {
            proxy_pass http://grafana:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
            # Grafana live (websocket)
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
        }

        # м—…лЎңл“ңлҗң м •м Ғ нҢҢмқј (мқҙлҜём§Җ/PDF)
        location /storage/ {
            alias /app/storage/;
            expires 1y;
            add_header Cache-Control "public, immutable";
            # м„ м–ё MIME мҷҖ лӢӨлҘё нҺҳмқҙлЎңл“ң(мҳҲ: png лқјлІЁмқёлҚ° мӢӨм ң html/svg)лҘј лёҢлқјмҡ°м Җк°Җ sniff н•ҙ
            # мӢӨн–үн•ҳм§Җ лӘ»н•ҳкІҢ м°ЁлӢЁ(м—…лЎңл“ң нҢҢмқј inline XSS л°©м–ҙ).
            add_header X-Content-Type-Options "nosniff" always;
            add_header Access-Control-Allow-Origin "*";
            # P2-11/B вҖ” editorк°Җ crossOriginIsolated лӘЁл“ңмқј л•Ң fabric мқҙлҜём§Җ лЎңл“ң нҶөкіј
            add_header Cross-Origin-Resource-Policy "cross-origin";
        }

        # м—җл””н„° мһ„лІ л“ң лІҲл“Ө (bookmoa PHP мёЎ мһ„лІ л“ңмҡ©)
        location /embed/ {
            alias /app/editor-embed/;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
            add_header Access-Control-Allow-Origin "*";
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            # P2-11/B вҖ” crossOriginIsolated нҳёнҷҳ
            add_header Cross-Origin-Resource-Policy "cross-origin";

            if ($request_method = 'OPTIONS') {
                add_header Access-Control-Allow-Origin "*";
                add_header Access-Control-Allow-Methods "GET, OPTIONS";
                add_header Access-Control-Max-Age 1728000;
                add_header Content-Type "text/plain; charset=utf-8";
                add_header Content-Length 0;
                return 204;
            }

            gzip_static on;
        }

        # лЈЁнҠё - лӢЁмҲң н…ҚмҠӨнҠё
        location = / {
            return 200 "Storige API\n";
            add_header Content-Type text/plain;
        }
    }
}
