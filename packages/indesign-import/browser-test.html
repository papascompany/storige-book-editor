<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>IDML 변환 브라우저 검증</title>
    <style>
      body { font-family: sans-serif; margin: 16px; }
      #status { padding: 8px 12px; border-radius: 6px; background: #eee; display: inline-block; }
      #status[data-ok='1'] { background: #dcfce7; }
      #status[data-ok='0'] { background: #fee2e2; }
      #preview { max-width: 1100px; border: 1px solid #ddd; margin-top: 12px; }
      #summary { margin: 10px 0; }
    </style>
  </head>
  <body>
    <h2>IDML → 표지 펼침면 (브라우저 변환 검증)</h2>
    <div id="status">로딩…</div>
    <div id="summary"></div>
    <div id="preview"></div>
    <script type="module">
      import { convertIdmlToTemplate, convertPsdToTemplate } from './src/index.mjs';
      const status = document.getElementById('status');
      const q = new URLSearchParams(location.search);
      const fmt = q.get('fmt') || 'idml'; // idml | psd
      const mode = q.get('mode') || 'hybrid';
      try {
        let result, previewSvg, summary;
        if (fmt === 'psd') {
          const res = await fetch('./fixtures/card-sample.psd');
          if (!res.ok) throw new Error('psd fixture fetch ' + res.status);
          const buf = await res.arrayBuffer();
          ({ result, previewSvg } = await convertPsdToTemplate(buf, { name: 'card', pageType: 'page' }));
          const objs = result.draftTemplateDto.canvasData.objects;
          summary = `<b>PSD → 단일페이지</b> · type=${result.draftTemplateDto.type} · ${result.widthMm}×${result.heightMm}mm · 객체 ${objs.length}(이미지 ${objs.filter(o=>o.type==='image').length}/텍스트 ${result.textCount}) · 경고 ${result.warnings.length}`;
          window.__convOK = { fmt, total: objs.length, textCount: result.textCount };
        } else {
          const res = await fetch('./fixtures/cover-sample.idml');
          if (!res.ok) throw new Error('idml fixture fetch ' + res.status);
          const buf = await res.arrayBuffer();
          ({ result, previewSvg } = await convertIdmlToTemplate(buf, { name: 'browser-test', mode }));
          const s = result.spec;
          const objs = result.draftTemplateDto.canvasData.objects;
          summary = `<b>IDML mode=${mode}</b> · cover ${s.coverWidthMm}×${s.coverHeightMm}mm · spine ${s.spineWidthMm}mm · total ${result.totalWidthMm}mm · 객체 ${objs.length}(이미지 ${objs.filter(o=>o.type==='image').length}/텍스트 ${objs.filter(o=>o.type==='textbox').length})`;
          window.__convOK = { fmt, mode, total: objs.length };
        }
        document.getElementById('preview').innerHTML = previewSvg;
        document.getElementById('summary').innerHTML = summary;
        status.textContent = `✅ 브라우저 변환 성공 (fmt=${fmt}${fmt==='idml'?', mode='+mode:''}, canvas 래스터 OK)`;
        status.dataset.ok = '1';
      } catch (e) {
        status.textContent = '❌ ' + (e && (e.stack || e.message));
        status.dataset.ok = '0';
      }
    </script>
  </body>
</html>
